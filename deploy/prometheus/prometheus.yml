global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/tiku-zong-alerts.yml

scrape_configs:
  # Prometheus should scrape the API through the local loopback interface.
  # Do not expose /metrics publicly merely for monitoring.
  - job_name: tiku-zong-api
    static_configs:
      - targets: ["127.0.0.1:8088"]
    metrics_path: /metrics
