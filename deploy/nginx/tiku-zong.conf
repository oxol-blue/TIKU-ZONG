# 宝塔/Nginx 模板：替换 server_name、root 和监控来源 IP 后使用。
upstream tiku_zong_api {
    server 127.0.0.1:8088;
    keepalive 32;
}

server {
    listen 80;
    server_name tiku.example.com;

    # 宝塔创建 HTTPS 站点后，将同一 location 规则复制到 443 server 块。
    root /www/wwwroot/tiku-zong/frontend/dist;
    index index.html;
    client_max_body_size 12m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /api/ {
        proxy_pass http://tiku_zong_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    location = /healthz {
        proxy_pass http://tiku_zong_api;
        proxy_set_header Host $host;
    }

    location = /readyz {
        proxy_pass http://tiku_zong_api;
        proxy_set_header Host $host;
    }

    # 按实际 Prometheus 地址增补 allow 规则；不要公开暴露运行指标。
    location = /metrics {
        allow 127.0.0.1;
        # allow 10.0.0.10;
        deny all;
        proxy_pass http://tiku_zong_api;
        proxy_set_header Host $host;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 包含 /payment/result 的 SPA 回跳和刷新访问必须回退到 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
